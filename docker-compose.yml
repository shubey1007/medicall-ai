services:
  postgres:
    image: postgres:16-alpine
    container_name: medicall-postgres
    environment:
      POSTGRES_DB: medicall
      POSTGRES_USER: medicall
      POSTGRES_PASSWORD: medicall
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medicall -d medicall"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16-alpine
    container_name: medicall-postgres-test
    environment:
      POSTGRES_DB: medicall_test
      POSTGRES_USER: medicall
      POSTGRES_PASSWORD: medicall
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medicall -d medicall_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: medicall-backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./scripts:/scripts
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build: ./dashboard
    container_name: medicall-dashboard
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: https://shubey.in
      VITE_SOCKET_URL: https://shubey.in
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
